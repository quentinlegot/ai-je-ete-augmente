#  Template NodeJS build

#  This template allows you to validate your NodeJS code.
#  The workflow allows running tests and code linting on the default branch.

image: node:16

pipelines:
  default:
    - parallel:
        - step:
            name: Check formatting
            script:
              - npm install
              - npm run format-check
            caches:
              - node
        - step:
            name: Code linting
            script:
              - npm install
              - npm run lint
            caches:
              - node
        - step:
            name: Type checking
            script:
              - npm install
              - npm run type-check
            caches:
              - node
